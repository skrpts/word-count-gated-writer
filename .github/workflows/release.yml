# Sign + release workflow for Hub-published skrpts (origin: skrptiq-hub repo).
#
# Pipeline: tag push → checkout → download CLI → verify deps → sign → zip → release → register version
#
# Validation is run LOCALLY by scripts/publish-skrpt.mjs before tag push
# (structural CLI scan + JS scanner). The scan GATE stays local (the publish
# gate is the canonical gate); publish-skrpt.mjs injects the security block into
# skrptiq.yaml AND writes security-report.json into the bundle. CI (GH#738) mints
# a GitHub OIDC token and POSTs both the version registration and the security
# report — the network writes are OIDC-authed here so no shared secret is needed.
# This is correct ONLY because every commit reaching this workflow originates
# from publish-skrpt.mjs and is therefore first-party.
#
# For community-submitted skrpts (future), use scripts/github-actions/caller-release.yml
# which keeps the full Download-CLI + Structural + JS-scan gate in CI.
#
# Requires org-level secrets:
#   SIGNING_PRIVATE_KEY       — Ed25519 PEM for signing
#   PIPELINE_APP_PRIVATE_KEY  — org-bot App private key; mints a short-lived read-only token for private skrptiq-hub
# Requires org-level variables:
#   PIPELINE_APP_ID           — org-bot App id (4071698)
# Hub API auth: GitHub OIDC (id-token: write) — no SCANNER_API_KEY (GH#738).

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # GH#738 — mint the GitHub OIDC token for Hub API auth

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Extract version and slug
        id: meta
        # `slug` is the GitHub repo name and is used wherever the release
        # asset is referenced (zip naming, release URL).
        # `db_slug` strips the `hub-shared-` prefix (shared objects only;
        # consumer skrpts have no prefix and are unchanged) and is used for
        # Hub API lookups, which key on the catalogue slug — distinct from
        # the GitHub repo name per the three-id model in publish-skrpt.mjs.
        # Without this split, the API lookups for shared objects 404,
        # silently skipping version registration.
        run: |
          REPO_NAME=$(basename "$GITHUB_REPOSITORY")
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "slug=${REPO_NAME}" >> "$GITHUB_OUTPUT"
          echo "db_slug=${REPO_NAME#hub-shared-}" >> "$GITHUB_OUTPUT"

      # CLI is required for the `skrptiq sign` step below. No scan use here —
      # the publish-skrpt.mjs local gate is the canonical scan path.
      - name: Download CLI (signing)
        run: |
          LATEST_URL=$(curl -sfL -o /dev/null -w '%{url_effective}' https://github.com/skrptiq/skrptiq-cli/releases/latest)
          LATEST_TAG=$(basename "$LATEST_URL")
          curl -sfL "https://github.com/skrptiq/skrptiq-cli/releases/download/${LATEST_TAG}/skrptiq-linux-amd64" -o /usr/local/bin/skrptiq
          chmod +x /usr/local/bin/skrptiq
          echo "Using CLI ${LATEST_TAG}"

      # GH#737 — mint a short-lived org-bot App installation token, scoped
      # read-only to the private skrptiq-hub repo, for the verify-deps fetch
      # below. Replaces the expiry-prone personal-access-token path — nothing to rotate.
      - name: Mint Hub-read token (org-bot App)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.PIPELINE_APP_ID }}
          private-key: ${{ secrets.PIPELINE_APP_PRIVATE_KEY }}
          owner: skrptiq
          repositories: skrptiq-hub

      - name: Verify declared dependencies (GH#612)
        # Per SKRPT-INTEGRATION v1.2 §2.0.1 + BUNDLE-INTEGRITY v1.0.5 §6.1:
        # If skrptiq.yaml declares dependencies, verify each against the Hub
        # catalogue. Reject on checksum mismatch (Build-for-reliability).
        # No-op for skrpts without dependencies (backwards-compatible).
        # GH#737 — auth via the org-bot App token minted above (read-only,
        # private skrptiq-hub); the ?ref=main content endpoint requires it.
        env:
          HUB_API_URL: https://hub.skrptiq.ai
          HUB_READ_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          curl -sf \
            -H "Authorization: Bearer ${HUB_READ_TOKEN}" \
            -H "Accept: application/vnd.github.raw+json" \
            "https://api.github.com/repos/skrptiq/skrptiq-hub/contents/scripts/verify-deps.mjs?ref=main" \
            -o /tmp/verify-deps.mjs

          mkdir -p /tmp/verify-deps-deps
          (cd /tmp/verify-deps-deps && npm init -y >/dev/null && npm install --silent --no-audit --no-fund yaml@^2)

          node /tmp/verify-deps.mjs skrptiq.yaml --hub-url="${HUB_API_URL}"

      - name: Sign bundle
        # Per BUNDLE-INTEGRITY-CONTRACT v1.0.5 §4.3-§4.4:
        # Single canonical invocation. No inline signing logic.
        # Engine's SignBundle handles file collection, manifest strip,
        # checksum, signature payload, and manifest update.
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
        run: skrptiq sign -key-env SIGNING_KEY .

      - name: Extract release notes
        id: notes
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if [ -f RELEASE_NOTES.md ]; then
            NOTES=$(node -e "
              const fs = require('fs');
              const content = fs.readFileSync('RELEASE_NOTES.md', 'utf-8');
              const version = '${VERSION}'.replace(/\./g, '\\\\.');
              const re = new RegExp('## v' + version + '\\\\s*\\\\n([\\\\s\\\\S]*?)(?=\\\\n## v|$)');
              const m = content.match(re);
              console.log(m ? m[1].trim() : '');
            ")
          else
            NOTES=""
          fi
          echo "$NOTES" > /tmp/release-notes.txt
          if [ -n "$NOTES" ]; then
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
            echo "Release notes found for v${VERSION}"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No release notes found for v${VERSION}"
          fi

      - name: Enforce release notes (all versions — GH#679 / K-040)
        if: steps.notes.outputs.has_notes == 'false'
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          # Reject-not-warn: patch, minor and major alike. No placeholder
          # fallback — a missing section is a hard fail, never a fake string.
          echo "::error::Release notes required for v${VERSION}. Add a '## v${VERSION}' section to RELEASE_NOTES.md describing what changed in this version."
          exit 1

      - name: Create release zip
        run: |
          SLUG="${{ steps.meta.outputs.slug }}"
          VERSION="${{ steps.meta.outputs.version }}"
          ZIP_NAME="${SLUG}-v${VERSION}.zip"
          zip -r "$ZIP_NAME" . -x ".git/*" ".github/*"
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.meta.outputs.version }}
          tag_name: ${{ github.ref_name }}
          body_path: /tmp/release-notes.txt
          # has_notes is always 'true' past the "Enforce release notes" gate
          # (GH#679) — auto-generation branch is unreachable, kept false.
          generate_release_notes: false
          files: ${{ env.zip_name }}

      - name: Register version + post security report to Hub API
        env:
          HUB_API_URL: https://hub.skrptiq.ai
        run: |
          # GH#738 — mint a short-lived GitHub OIDC token (audience hub.skrptiq.ai)
          # for Hub API auth, replacing the SCANNER_API_KEY shared secret.
          HUB_OIDC_TOKEN=$(curl -sf -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=hub.skrptiq.ai" | node -pe 'JSON.parse(require("fs").readFileSync(0,"utf8")).value')
          echo "::add-mask::${HUB_OIDC_TOKEN}"
          SLUG="${{ steps.meta.outputs.db_slug }}"
          VERSION="${{ steps.meta.outputs.version }}"

          # ── FAIL LOUD on lookup failure (build-for-reliability) ──
          # K-037 + Action 6 (`0bcc5ae0`) make the signed bundle's top-level
          # `manifest.id` equal to the D1 catalogue row's `id` by construction.
          # Read SKRPT_ID directly from the signed yaml — avoids the 404 on
          # /api/skrpts/<slug> for shared-objects + the bootstrap chicken/egg
          # for net-new versions.
          SKRPT_ID=$(grep -E '^id: ' skrptiq.yaml | head -1 | sed -E 's/^id: *"?([^"]+)"?$/\1/')

          if [ -z "$SKRPT_ID" ]; then
            echo "::error::Could not extract manifest.id from signed skrptiq.yaml for slug='${SLUG}' — refusing to skip version registration"
            exit 1
          fi

          # Extract content hash from the signed manifest's integrity block.
          # ANCHORED on the `integrity:` block (NOT the first `checksum:` in
          # the manifest) — post-GH#625 dep-referenced consumers have 1+N
          # `checksum:` entries (one per dep + one in integrity).
          CONTENT_HASH=$(node -e "
            const m = require('fs').readFileSync('skrptiq.yaml','utf-8');
            const intMatch = m.match(/integrity:\\s*\\n(?:\\s+\\w+:[^\\n]*\\n)*\\s+checksum:\\s*\"?sha256:([a-f0-9]+)\"?/);
            console.log(intMatch ? intMatch[1] : '');
          ")

          # GH#679 / K-040 — no placeholder fallback. The Enforce-release-notes
          # step above hard-fails the job when notes are absent, so the value
          # read here is guaranteed real; the API rejects placeholders too.
          PAYLOAD=$(node -e "
            const notes = require('fs').readFileSync('/tmp/release-notes.txt','utf-8').trim();
            console.log(JSON.stringify({
              version:'${VERSION}',
              git_commit:'${GITHUB_SHA}',
              release_notes: notes,
              content_hash:'${CONTENT_HASH}'
            }));
          ")

          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
            -X POST "${HUB_API_URL}/api/skrpts/by-id/${SKRPT_ID}/versions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${HUB_OIDC_TOKEN}" \
            -d "$PAYLOAD" 2>/dev/null || echo "000")

          # 409 is the idempotent re-publish case — keep this soft.
          if [ "$HTTP_CODE" = "201" ]; then echo "Version registered (HTTP 201)"
          elif [ "$HTTP_CODE" = "409" ]; then echo "Version already exists (HTTP 409 — idempotent re-publish, allowed)"
          else
            echo "::error::Version registration POST failed for ${SLUG}@${VERSION} (HTTP ${HTTP_CODE}) — refusing to mark workflow green" >&2
            exit 1
          fi

          # GH#738 — POST the security report. Relocated from publish-skrpt.mjs
          # (which now writes security-report.json into the bundle so the OIDC
          # token can be minted here in CI). The local scan GATE stays in
          # publish-skrpt.mjs; only this network write moved. Soft (supplementary).
          if [ -f security-report.json ]; then
            SEC_CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              -X POST "${HUB_API_URL}/api/skrpts/by-id/${SKRPT_ID}/security" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${HUB_OIDC_TOKEN}" \
              -d @security-report.json 2>/dev/null || echo "000")
            if [ "$SEC_CODE" = "201" ]; then echo "Security report submitted (HTTP 201)"
            elif [ "$SEC_CODE" = "409" ]; then echo "Security report already exists (HTTP 409 — idempotent)"
            else echo "::warning::Security report POST returned HTTP ${SEC_CODE}"; fi
          else
            echo "::warning::security-report.json not found in bundle — skipping security POST"
          fi
